name: Build LabProbe Router Agent

on:
  workflow_dispatch:
  push:
    paths:
      - 'labrelay/**'
      - 'scripts/labprobe-install.sh'
    tags:
      - 'labrelay-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            arch: arm64
          - target: x86_64-unknown-linux-musl
            arch: amd64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labrelay
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --all-targets
      - name: Install cross
        run: cargo install cross --locked
      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }}
      - name: Prepare files and SHA256
        run: |
          mkdir -p ../dist
          cp target/${{ matrix.target }}/release/labrelay ../dist/labrelay-linux-${{ matrix.arch }}
          cd ../dist
          sha256sum labrelay-linux-${{ matrix.arch }} > labrelay-linux-${{ matrix.arch }}.sha256
      - name: Prepare installer
        if: matrix.arch == 'amd64'
        run: cp ../scripts/labprobe-install.sh ../dist/labprobe-install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: labrelay-linux-${{ matrix.arch }}
          path: |
            dist/labrelay-linux-${{ matrix.arch }}
            dist/labrelay-linux-${{ matrix.arch }}.sha256
      - name: Publish GitHub Release files
        if: startsWith(github.ref, 'refs/tags/labrelay-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/labrelay-linux-${{ matrix.arch }}
            dist/labrelay-linux-${{ matrix.arch }}.sha256
      - name: Publish installer
        if: startsWith(github.ref, 'refs/tags/labrelay-v') && matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/labprobe-install.sh
