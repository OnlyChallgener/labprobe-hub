name: Build LabRelay Router Binary

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "labrelay/**"
      - "scripts/labrelay*"
      - "scripts/install_labrelay.sh"
      - ".github/workflows/labrelay-build.yml"

  create:

jobs:
  build-aarch64-musl:
    if: >
      github.event_name != 'create' ||
      startsWith(github.ref, 'refs/tags/labrelay-v')

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: labrelay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --all-targets

      - name: Install cross
        run: cargo install cross --locked

      - name: Build static ARM64 binary
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Prepare router package
        run: |
          mkdir -p ../dist/labrelay-router

          cp target/aarch64-unknown-linux-musl/release/labrelay \
            ../dist/labrelay-router/labrelay-aarch64-musl

          cp ../scripts/labrelay_agent.sh \
             ../scripts/labrelay.init \
             ../scripts/labrelay-agent.init \
             ../scripts/install_labrelay.sh \
             ../dist/labrelay-router/

          cd ../dist/labrelay-router
          chmod 755 *
          sha256sum labrelay-aarch64-musl > SHA256SUMS.txt
          tar -czf ../labrelay-router-aarch64-v0.1.0.tar.gz .

      - name: Upload router package
        uses: actions/upload-artifact@v4
        with:
          name: labrelay-router-aarch64-v0.1.0
          path: |
            dist/labrelay-router/
            dist/labrelay-router-aarch64-v0.1.0.tar.gz
          if-no-files-found: error
          retention-days: 30