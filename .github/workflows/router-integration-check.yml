name: Router Integration Check

on:
  push:
    branches:
      - codex/router-rpc-v098-relay-v029
    paths:
      - router_*.py
      - hub_entry.py
      - requirements.txt
      - tests/**
      - .github/workflows/router-integration-check.yml
  workflow_dispatch:

concurrency:
  group: hub-router-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Compile and test
        run: |
          python -m py_compile hub.py hub_entry.py router_rpc.py router_rpc_v099.py router_rpc_v010.py router_developer_flow_patch.py router_http_developer_transport_patch.py router_be72_auth_patch.py router_be72_sid_wire_patch.py router_ws_patch.py router_compat.py
          pytest -q
