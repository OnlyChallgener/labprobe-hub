name: Router Integration Check

on:
  push:
    branches:
      - codex/router-rpc-v098-relay-v029
    paths:
      - router_*.py
      - hub.py
      - hub_entry.py
      - labprobe_storage.py
      - requirements.txt
      - pytest.ini
      - tests/**
      - labrelay/**
      - .github/workflows/router-integration-check.yml
  pull_request:
    paths:
      - router_*.py
      - hub.py
      - hub_entry.py
      - labprobe_storage.py
      - requirements.txt
      - pytest.ini
      - tests/**
      - labrelay/**
      - .github/workflows/router-integration-check.yml
  workflow_dispatch:

concurrency:
  group: hub-router-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Compile and test Hub
        working-directory: ${{ github.workspace }}
        run: |
          python -m py_compile hub.py hub_entry.py labprobe_storage.py router_rpc.py router_rpc_v099.py router_rpc_v010.py router_developer_flow_patch.py router_http_developer_transport_patch.py router_be72_auth_patch.py router_be72_sid_wire_patch.py router_native_features_patch.py router_ws_patch.py router_compat.py router_realtime_stability_patch.py router_relay_credentials_patch.py
          python -m pytest -q
      - name: Compile and test LabRelay low-traffic agent
        working-directory: ${{ github.workspace }}/labrelay
        run: |
          cargo test --all-targets
          cargo build --release
          grep -q 'pub hub_direct_mode: bool' src/agent.rs
          grep -q 'if !config.hub_direct_mode && dashboard_due' src/agent.rs
          grep -q 'credentialsSince={}&wait=55' src/agent.rs
          grep -q '.timeout(request_timeout)' src/agent.rs
          grep -q 'credentialsCompletedNonce' src/agent.rs
          grep -q 'env!("CARGO_PKG_VERSION")' src/main.rs
