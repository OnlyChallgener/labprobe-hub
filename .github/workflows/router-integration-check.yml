name: Router Integration Check

on:
  push:
    branches:
      - codex/router-rpc-v098-relay-v029
    paths:
      - Dockerfile
      - router_*.py
      - hub.py
      - hub_entry.py
      - labprobe_storage.py
      - requirements.txt
      - pytest.ini
      - tests/**
      - labrelay/**
      - .github/workflows/router-integration-check.yml
  pull_request:
    paths:
      - Dockerfile
      - router_*.py
      - hub.py
      - hub_entry.py
      - labprobe_storage.py
      - requirements.txt
      - pytest.ini
      - tests/**
      - labrelay/**
      - .github/workflows/router-integration-check.yml
  workflow_dispatch:

concurrency:
  group: hub-router-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Compile and test Hub
        working-directory: ${{ github.workspace }}
        run: |
          python -m py_compile hub.py hub_entry.py labprobe_storage.py router_rpc.py router_rpc_v099.py router_rpc_v010.py router_developer_flow_patch.py router_http_developer_transport_patch.py router_be72_auth_patch.py router_be72_sid_wire_patch.py router_native_features_patch.py router_ws_patch.py router_compat.py router_realtime_stability_patch.py router_relay_credentials_patch.py router_lite_realtime_patch.py
          python -m pytest -q
          grep -q '/api/router/realtime/agent/demand' router_lite_realtime_patch.py
          grep -q '/api/router/realtime/agent/push' router_lite_realtime_patch.py
          grep -q 'relay_local_dev_sta' router_lite_realtime_patch.py
          grep -q 'acceptedRouter' router_lite_realtime_patch.py
          grep -q 'acceptedDevices' router_lite_realtime_patch.py
          grep -q 'if router_active else {}' router_lite_realtime_patch.py
          grep -q 'devices_active and isinstance' router_lite_realtime_patch.py
          ! grep -q 'requests.Session' router_lite_realtime_patch.py
          ! grep -q 'ws_sysinfo' router_lite_realtime_patch.py
          ! grep -q 'user_list' router_lite_realtime_patch.py
          ! grep -q 'sync_devices' router_lite_realtime_patch.py
          grep -q 'HUB_VERSION = "0.9.19"' hub_entry.py
      - name: Build and inspect runtime Docker image
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          docker build --tag labprobe-hub-ci:latest .
          docker run --rm --entrypoint sh labprobe-hub-ci:latest -c 'test -f /app/router_lite_realtime_patch.py'
          docker run --rm --entrypoint python labprobe-hub-ci:latest -c 'import router_lite_realtime_patch; print("router_lite_realtime_patch import ok")'
      - name: Compile and test LabRelay local realtime agent
        working-directory: ${{ github.workspace }}/labrelay
        run: |
          cargo test --all-targets
          cargo build --release
          grep -q 'pub hub_direct_mode: bool' src/agent.rs
          grep -q 'crate::runtime::run' src/agent.rs
          grep -q '^mod runtime;' src/main.rs
          grep -q '/api/router/realtime/agent/demand' src/runtime.rs
          grep -q '/api/router/realtime/agent/push' src/runtime.rs
          grep -q 'dev_sta_json("ws_sysinfo"' src/runtime.rs
          grep -q '"user_list"' src/runtime.rs
          grep -q 'relay_local_dev_sta' src/runtime.rs
          grep -q 'env!("CARGO_PKG_VERSION")' src/main.rs
          grep -q 'version = "0.2.11"' Cargo.toml
