home:
  name: "LabProbe 家庭网络"

server:
  # 也可以通过 docker-compose 环境变量 APP_TOKEN / HOOK_TOKEN 覆盖
  app_token: "change-app-token"
  hook_token: "change-hook-token"

# DDNS 实际解析检查。第一版建议先只配置 net86.dynv6.net。
ddns:
  - name: "NAS / Lucky"
    domain: "net86.dynv6.net"
    expect: "nas_ipv6"
    record_types: ["A", "AAAA"]

router:
  enabled: true
  name: "Ruijie BE72"
  mode: "push"

# 只显示你关注的设备。mac 要写真实 MAC。
watched_devices:
  - name: "iQOO Neo3"
    mac: "DA:1F:85:0C:19:FC"
  - name: "绿联 NAS"
    mac: "6C:1F:F7:76:71:04"

polling:
  enabled: false
  interval_seconds: 60

exit_ip:
  ipv4_url: "https://api64.ipify.org"
  ipv6_url: "https://api64.ipify.org"

# Geo 识别优先级：本地前缀标记 > 运营商/ASN > 公网 Geo 参考。
# 把你家里的 IPv6 前缀写进去后，DNS 页面会优先显示“家里 · 湖南衡阳 · 联通”，比公网 Geo 准。
geo:
  local_prefixes:
    - prefix: "2408:8252:3200:9231::/64"
      label: "家里路由前缀"
      location: "湖南衡阳"
      operator: "中国联通"
