home:
  name: "LabProbe Hub"

server:
  # APP 使用 app_token；LabRelay、Lucky 与 Webhook 使用 hook_token。
  app_token: "change-app-token"
  hook_token: "change-hook-token"

router:
  enabled: true
  # Optional display name. Leave blank to use the name reported by LabRelay.
  name: ""
  agent_name: ""
  portmap_id: ""
  mode: "push"

# 只显示明确关注的终端；示例地址均为文档用途。
watched_devices:
  - name: "工作站"
    mac: "02:00:00:00:00:01"
  - name: "家庭服务器"
    mac: "02:00:00:00:00:02"

polling:
  enabled: false
  interval_seconds: 60

exit_ip:
  ipv4_url: "https://api64.ipify.org"
  ipv6_url: "https://api64.ipify.org"

ddns:
  - name: "家庭入口"
    domain: "hub.example.com"
    expect: "host_ipv6"
    record_types: ["A", "AAAA"]

wol:
  broadcasts:
    - "192.168.1.255"

geo:
  local_prefixes: []
