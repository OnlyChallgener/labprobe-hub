services:
  mqtt-init:
    image: eclipse-mosquitto:2
    container_name: labprobe-mqtt-init
    user: "0:0"
    restart: "no"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-labprobe}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-mqtt-password}
      MQTT_LOCAL_BIND: 0.0.0.0
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /mosquitto/config/runtime
        rm -f /mosquitto/config/runtime/passwords /mosquitto/config/runtime/passwords.tmp
        mosquitto_passwd -b -c /mosquitto/config/runtime/passwords "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        {
          echo "persistence true"
          echo "persistence_location /mosquitto/data/"
          echo "log_dest stdout"
          echo "log_timestamp true"
          echo "connection_messages true"
          echo "log_type error"
          echo "log_type warning"
          echo "log_type notice"
          echo "log_type information"
          echo ""
          echo "listener 1883 $$MQTT_LOCAL_BIND"
          echo "protocol mqtt"
          echo "allow_anonymous false"
          echo "password_file /mosquitto/config/runtime/passwords"
          echo ""
          echo "listener 9001 0.0.0.0"
          echo "protocol websockets"
          echo "allow_anonymous false"
          echo "password_file /mosquitto/config/runtime/passwords"
        } > /mosquitto/config/runtime/mosquitto.conf
        chown -R 1883:1883 /mosquitto/config/runtime
        chmod 600 /mosquitto/config/runtime/passwords
        chmod 644 /mosquitto/config/runtime/mosquitto.conf
        echo "MQTT configuration generated; connection logging enabled"
    volumes:
      - ./config/mqtt:/mosquitto/config/runtime

  labprobe-mqtt:
    image: eclipse-mosquitto:2
    container_name: labprobe-mqtt
    restart: unless-stopped
    depends_on:
      mqtt-init:
        condition: service_completed_successfully
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-labprobe}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-mqtt-password}
    command: ["mosquitto", "-c", "/mosquitto/config/runtime/mosquitto.conf"]
    ports:
      - "${MQTT_WS_BIND:-0.0.0.0}:${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./config/mqtt:/mosquitto/config/runtime:ro
      - ./data/mqtt:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -u \"$$MQTT_USERNAME\" -P \"$$MQTT_PASSWORD\" -t labprobe/health -m ping -q 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  labprobe-hub:
    image: ${LABPROBE_IMAGE:-onlychallgener/labprobe-hub:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labprobe-hub
    restart: unless-stopped
    depends_on:
      labprobe-mqtt:
        condition: service_healthy
    ports:
      - "${PORT:-58443}:${PORT:-58443}"
    environment:
      PORT: ${PORT:-58443}
      TZ: ${TZ:-Asia/Shanghai}
      CONFIG_PATH: ./config/config.yaml
      CONFIG_DIR: ./config
      DATA_DIR: ./data
      BACKUPS_DIR: ./backups
      LOGS_DIR: ./logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      HUB_HOST_IPV4: ${HUB_HOST_IPV4:-}
      HUB_HOST_IPV6: ${HUB_HOST_IPV6:-}
      HUB_HOST_MAC: ${HUB_HOST_MAC:-}
      HUB_ADVERTISE_URL: ${HUB_ADVERTISE_URL:-}
      HUB_NAME: ${HUB_NAME:-LabProbe Hub}
      PRIMARY_ROUTER_NAME: ${PRIMARY_ROUTER_NAME:-}
      UPDATE_REPOSITORY_ROOT: ${UPDATE_REPOSITORY_ROOT:-}
      APP_TOKEN: ${APP_TOKEN:-change-app-token}
      HOOK_TOKEN: ${HOOK_TOKEN:-change-hook-token}
      NAS_IPV4: ${NAS_IPV4:-}
      NAS_IPV6: ${NAS_IPV6:-}
      NAS_MAC: ${NAS_MAC:-}
      PORTMAP_ROUTER_NAME: ${PORTMAP_ROUTER_NAME:-}
      MQTT_PUBLIC_URL: ${MQTT_PUBLIC_URL:-}
      MQTT_INTERNAL_HOST: labprobe-mqtt
      MQTT_INTERNAL_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-labprobe}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-mqtt-password}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-labprobe/hub}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./backups:/app/backups
      - ./logs:/app/logs
